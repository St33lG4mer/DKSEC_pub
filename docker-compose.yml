services:
  dksec:
    build: .
    container_name: dksec
    restart: unless-stopped
    expose:
      - "8501"
    volumes:
      - ./catalogs:/app/catalogs
      - ./output:/app/output

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
